name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sandcastle
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: sandcastle
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sandcastle
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sandcastle.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p sandcastle-cli
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: sandcastle-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} sandcastle-${{ matrix.target }}${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}
          gh release upload ${{ github.ref_name }} sandcastle-${{ matrix.target }}${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }} --clobber