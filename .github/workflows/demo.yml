name: Regenerate demo

on:
  push:
    paths:
      - 'demo.tape'
      - 'crates/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vhs:
    name: Record demo.gif
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg, gifsicle, ttyd, vhs
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg gifsicle ttyd
          URL=$(curl -sSL https://api.github.com/repos/charmbracelet/vhs/releases/latest \
            | grep -oE '"browser_download_url":\s*"[^"]*Linux_x86_64\.tar\.gz"' \
            | head -1 | cut -d'"' -f4)
          cd /tmp && curl -sSL "$URL" | tar -xz --strip-components=1
          sudo mv /tmp/vhs /usr/local/bin/vhs

      - name: Build sandcastle
        run: cargo build --release -p sandcastle-cli

      - name: Run VHS
        run: vhs demo.tape

      - name: Compress GIF
        run: gifsicle -O3 docs/demo.gif -o docs/demo.gif

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(demo): regenerate demo.gif'
          file_pattern: '*.gif'
