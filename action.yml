name: 'SandCastle Sandbox'
description: 'Run AI agent commands in an OS-level sandbox with policy enforcement'
author: 'OpenShield'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  profile:
    description: 'Security profile to use (claude-code, codex, ollama, develop, build)'
    required: false
    default: 'develop'
  command:
    description: 'Command to run inside the sandbox'
    required: true
  allow-dirs:
    description: 'Additional directories to allow (comma-separated)'
    required: false
    default: ''
  allow-net:
    description: 'Additional network domains to allow (comma-separated)'
    required: false
    default: ''
  mode:
    description: 'Enforcement mode (enforce or audit)'
    required: false
    default: 'enforce'
  max-risk-score:
    description: 'Maximum acceptable risk score (0-10). Fails the step if exceeded.'
    required: false
    default: '10'
  version:
    description: 'SandCastle version to install'
    required: false
    default: 'latest'

outputs:
  risk-score:
    description: 'Risk score of the sandboxed run (0-10)'
  audit-log:
    description: 'Path to the audit log file'
  exit-code:
    description: 'Exit code of the sandboxed command'

runs:
  using: 'composite'
  steps:
    - name: Install SandCastle
      shell: bash
      # All inputs passed via environment variables to prevent shell injection.
      env:
        SC_VERSION: ${{ inputs.version }}
      run: |
        if [ "$SC_VERSION" = "latest" ]; then
          cargo install sandcastle-cli --locked
        else
          cargo install "sandcastle-cli@${SC_VERSION}" --locked
        fi

    - name: Run sandboxed command
      shell: bash
      id: sandbox
      env:
        SC_PROFILE: ${{ inputs.profile }}
        SC_MODE: ${{ inputs.mode }}
        SC_COMMAND: ${{ inputs.command }}
        SC_ALLOW_DIRS: ${{ inputs.allow-dirs }}
        SC_ALLOW_NET: ${{ inputs.allow-net }}
      run: |
        ARGS="--profile ${SC_PROFILE} --mode=${SC_MODE}"

        if [ -n "$SC_ALLOW_DIRS" ]; then
          IFS=',' read -ra DIRS <<< "$SC_ALLOW_DIRS"
          for dir in "${DIRS[@]}"; do
            trimmed=$(echo "$dir" | xargs)
            ARGS="$ARGS --allow-dir $trimmed"
          done
        fi

        if [ -n "$SC_ALLOW_NET" ]; then
          IFS=',' read -ra DOMAINS <<< "$SC_ALLOW_NET"
          for domain in "${DOMAINS[@]}"; do
            trimmed=$(echo "$domain" | xargs)
            ARGS="$ARGS --allow-net $trimmed"
          done
        fi

        set +e
        sandcastle run $ARGS -- $SC_COMMAND
        SC_EXIT=$?
        set -e
        echo "exit-code=${SC_EXIT}" >> $GITHUB_OUTPUT
        echo "audit-log=.sandcastle/audit.log" >> $GITHUB_OUTPUT
        exit $SC_EXIT

    - name: Upload audit log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sandcastle-audit-log
        path: .sandcastle/audit.log
        if-no-files-found: ignore
